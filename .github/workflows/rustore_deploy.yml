name: Rustore release (Deployment)

on:
  push:
    branches:
      - main

# on:
#   release:
#     types: [published]      

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v2


      - name: Set up Python
        uses: actions/setup-python@v2
        with:
            python-version: '3.11'

      # Установка JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'

      # Установка Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

#     Создание .env файла
      - name: Create .env file
        run: |
          echo "FIREBASE_CONFIG=${{ secrets.FIREBASE_CONFIG }}" >> .env
          echo "RUSTORE_KEY_ID=${{ secrets.RUSTORE_KEY_ID }}" >> .env
          echo "RUSTORE_PRIVATE_KEY=${{ secrets.RUSTORE_PRIVATE_KEY }}" >> .env


      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Print google-services.json content
        run: cat android/app/google-services.json

      - name: Run tests
        run: flutter test test/main_test.dart --coverage

      - name: Build APK
        run: flutter build apk --release

      - name: Generate RuStore API token
        uses: actions/cache@v3
        run: |
            python generate_token.py