name: Rustore release (Deployment)

#on:
#  push:
#    branches:
#      - main

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pycryptodome 
          pip install python-dotenv
          pip install requests

      # Установка JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Установка Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Создание .env файла
      - name: Create .env file
        run: |
          echo "FIREBASE_CONFIG=${{ secrets.FIREBASE_CONFIG }}" >> .env
          echo "RUSTORE_KEY_ID=${{ secrets.RUSTORE_KEY_ID }}" >> .env
          echo "RUSTORE_PRIVATE_KEY=${{ secrets.RUSTORE_PRIVATE_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env


      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Analyze
        run: flutter analyze

      - name: Custom lint
        run: dart run custom_lint

      - name: Run tests
        run: flutter test --coverage

      - name: Build APK
        run: flutter build apk --release

      - name: Release APK to RuStore
        if: github.event_name == 'release' && github.event.action == 'published'
        run: |
            python release_apk_rustore.py "${{ github.event.release.body }}"