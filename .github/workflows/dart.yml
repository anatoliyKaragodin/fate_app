name: Main Branch Workflow (Deployment)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v2

      # Установка JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'

      # Установка Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

      # Создание .env файла
      - name: Create .env file
        run: |
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env

      - name: Run tests
        run: flutter test test/main_test.dart --coverage

      - name: Fix flutter_rustore_update build.gradle
        run: |
          sed -i 's/android {/android {\n    namespace "ru.rustore.flutter_rustore_update"/' $HOME\.pub-cache\hosted\pub.dev\flutter_rustore_update-6.1.0\android\build.gradle

      - name: Build APK
        run: flutter build apk --release
